databases:
  - name: edunexus-db
    plan: free
    region: ohio

services:
  # Node.js API Service
  - type: web
    name: edunexus-api
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install
    # Combined start command: Migrate -> Seed -> Start
    startCommand: "npm run migrate && npm run seed && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: edunexus-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: edunexus-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: edunexus-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: edunexus-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: edunexus-db
          property: password
      # Strictly required by backend/config/validator.js
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PLATFORM_JWT_SECRET
        generateValue: true
      - key: REDIS_HOST
        value: "localhost" # Placeholder; Update to real Redis host for workers
      - key: FRONTEND_URL
        value: "https://your-vercel-app-url.vercel.app"
      - key: CORS_ORIGIN
        value: "https://your-vercel-app-url.vercel.app"
