databases:
  - name: edunexus-db
    plan: free
    region: ohio

services:
  # --- EduNexus API Core ---
  # Dashboard Location: Projects -> EduNexus -> edunexus-api-v2
  - type: web
    name: edunexus-api-v2
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install
    # Combined: Migration -> Seed (Allowed) -> Production Start
    startCommand: "npm run migrate && npm run seed && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: edunexus-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: edunexus-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: edunexus-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: edunexus-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: edunexus-db
          property: password
      # --- Identity & Seeding ---
      - key: ALLOW_PROD_SEED
        value: "true" # Required for initial demo data injection in production
      
      # --- Authentication Secrets ---
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PLATFORM_JWT_SECRET
        generateValue: true
        
      # --- Infrastructure ---
      - key: REDIS_HOST
        value: "localhost" # Internal Redis for workers (ensure a Redis service is attached)
        
      # --- Cross-Origin Resource Sharing (CORS) ---
      # IMPORTANT: Update these to your real Vercel domain
      - key: FRONTEND_URL
        value: "https://edunexus-frontend.vercel.app" 
      - key: CORS_ORIGIN
        value: "https://edunexus-frontend.vercel.app"
